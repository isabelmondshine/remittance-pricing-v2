# ── Data model ─────────────────────────────────────────────────────────────────

class Quote:
    def __init__(self, provider, from_ccy, to_ccy, send_amount,
                 fee_usd=None, fx_rate=None, fx_markup_pct=None,
                 received_amount=None, note="", error=""):
        self.provider       = provider
        self.from_ccy       = from_ccy
        self.to_ccy         = to_ccy
        self.send_amount    = send_amount
        self.fee_usd        = fee_usd
        self.fx_rate        = fx_rate
        self.fx_markup_pct  = fx_markup_pct
        self.received_amount = received_amount
        self.note           = note
        self.error          = error

    def calc_markup(self, mid_rate):
        """Calculate FX markup % vs mid-market if not provided."""
        if self.fx_markup_pct is None and self.fx_rate and mid_rate:
            self.fx_markup_pct = round((mid_rate - self.fx_rate) / mid_rate * 100, 3)

    def calc_received(self):
        """Estimate received amount if not provided."""
        if self.received_amount is None and self.fx_rate and self.fee_usd is not None:
            self.received_amount = round((self.send_amount - self.fee_usd) * self.fx_rate, 2)


# ── Provider: Wise Comparison API ─────────────────────────────────────────────

def get_wise_quotes(from_ccy: str, to_ccy: str, amount: float) -> list:
    """
    Wise public Comparison API — no auth required.
    Covers Wise, Remitly, Western Union, MoneyGram, Revolut, Xoom, Ria, WorldRemit.
    Bank transfer in/out only. Updated ~hourly by Wise.
    """
    url = (f"https://api.wise.com/v4/comparisons/"
           f"?sourceCurrency={from_ccy}&targetCurrency={to_ccy}&sendAmount={amount}")
    try:
        resp = SESSION.get(url, timeout=20)
        resp.raise_for_status()
        data = resp.json()
    except Exception as e:
        return [Quote("Wise API", from_ccy, to_ccy, amount, error=f"Wise API failed: {e}")]

    DISPLAY = {
        "wise": "Wise", "remitly": "Remitly", "westernunion": "Western Union",
        "moneygram": "MoneyGram", "revolut": "Revolut", "xoom": "Xoom",
        "ria": "Ria Money", "worldremit": "WorldRemit", "transfergo": "TransferGo",
    }

    best = {}
    for q in data.get("quotes", []):
        pid = (q.get("provider", {}).get("id") or "").lower().replace(" ", "").replace("-", "")
        if not pid:
            continue
        rcv = q.get("totalReceivedAmount") or q.get("recipientGetsAmount") or 0
        if rcv > (best.get(pid, {}).get("_rcv", 0)):
            q["_rcv"] = rcv
            best[pid] = q

    results = []
    mid = APPROX_MID_MARKET.get((from_ccy, to_ccy))
    for pid, q in best.items():
        fee      = q.get("fee") or (q.get("fees") or {}).get("total") or 0
        rate     = q.get("rate") or q.get("exchangeRate")
        markup   = q.get("rateMarkupPercentage")
        received = q.get("totalReceivedAmount") or q.get("recipientGetsAmount")
        label    = DISPLAY.get(pid, pid.capitalize())

        quote = Quote(
            provider=label, from_ccy=from_ccy, to_ccy=to_ccy, send_amount=amount,
            fee_usd=fee, fx_rate=rate, fx_markup_pct=markup, received_amount=received,
            note="Wise Comparison API",
        )
        if markup is None:
            quote.calc_markup(mid)
        if received is None:
            quote.calc_received()
        results.append(quote)

    if not results:
        results.append(Quote("Wise API", from_ccy, to_ccy, amount,
                             error="No quotes returned — corridor may not be supported"))
    return results


# ── Provider: Remitly ──────────────────────────────────────────────────────────

def get_remitly_quote(from_ccy: str, to_ccy: str, amount: float) -> Quote:
    """
    Remitly's public calculator API. Economy rate, bank deposit.
    Tries multiple known endpoint patterns.
    """
    country = CURRENCY_TO_COUNTRY.get(to_ccy, "")
    mid = APPROX_MID_MARKET.get((from_ccy, to_ccy))

    # Remitly endpoint v1 — their current web calculator backend
    endpoints = [
        {
            "method": "GET",
            "url": "https://api.remitly.com/v1/calculator/price",
            "params": {
                "source_country": "USA",
                "destination_country": country,
                "source_currency": from_ccy,
                "destination_currency": to_ccy,
                "amount": str(int(amount)),
                "amount_type": "SEND",
                "conduit_type": "BANK_DEPOSIT",
            },
        },
        {
            "method": "GET",
            "url": "https://www.remitly.com/api/v1/calculator",
            "params": {
                "sourceCountry": "USA",
                "destCountry": country,
                "sourceCurrency": from_ccy,
                "destCurrency": to_ccy,
                "sendAmount": str(int(amount)),
                "deliveryType": "BANK_DEPOSIT",
            },
        },
    ]

    for ep in endpoints:
        try:
            if ep["method"] == "GET":
                resp = SESSION.get(ep["url"], params=ep.get("params"), timeout=15)
            else:
                resp = SESSION.post(ep["url"], json=ep.get("body"), timeout=15)

            if resp.status_code != 200:
                continue

            data = resp.json()

            # Try to extract from various response schemas
            fee      = _find_val(data, ["fee", "transfer_fee", "transferFee", "serviceFee"])
            rate     = _find_val(data, ["exchange_rate", "exchangeRate", "rate", "fx_rate"])
            received = _find_val(data, ["destination_amount", "destinationAmount",
                                        "recipient_amount", "recipientAmount", "receive_amount"])

            # Handle nested structures
            if fee is None and "pricing" in data:
                fee = _find_val(data["pricing"], ["fee", "transfer_fee"])
            if rate is None and "fx" in data:
                rate = _find_val(data["fx"], ["rate", "exchange_rate"])

            # Some endpoints return a list of options
            if fee is None and isinstance(data.get("rates") or data.get("options"), list):
                options = data.get("rates") or data.get("options") or []
                for opt in options:
                    spd = str(opt.get("speed") or opt.get("delivery_speed") or "").upper()
                    if "ECONOMY" in spd or "STANDARD" in spd or not spd:
                        fee      = _find_val(opt, ["fee", "transfer_fee"])
                        rate     = _find_val(opt, ["exchange_rate", "rate"])
                        received = _find_val(opt, ["recipient_amount", "destination_amount"])
                        break

            if rate is None:
                continue  # try next endpoint

            quote = Quote(
                provider="Remitly", from_ccy=from_ccy, to_ccy=to_ccy, send_amount=amount,
                fee_usd=float(fee or 0), fx_rate=float(rate),
                received_amount=float(received) if received else None,
                note="Economy, bank deposit",
            )
            quote.calc_markup(mid)
            quote.calc_received()
            return quote

        except Exception:
            continue

    return Quote("Remitly", from_ccy, to_ccy, amount,
                 error="API unavailable — Remitly may require browser session")


# ── Provider: Western Union ────────────────────────────────────────────────────

def get_western_union_quote(from_ccy: str, to_ccy: str, amount: float) -> Quote:
    """Western Union public price estimator. Bank account in/out."""
    country = CURRENCY_TO_COUNTRY.get(to_ccy, "")
    mid = APPROX_MID_MARKET.get((from_ccy, to_ccy))

    endpoints = [
        {
            "url": "https://www.westernunion.com/us/en/web/send-money/api/price-estimator",
            "body": {
                "sendCurrencyCode": from_ccy, "destCurrencyCode": to_ccy,
                "destCountryCode": country,   "sendAmount": str(int(amount)),
                "payinMethod": "ACCOUNT",      "payoutMethod": "ACCOUNT",
            },
        },
        {
            "url": "https://www.westernunion.com/wuconnect/rest/pricing/v3/estimate",
            "body": {
                "originCountry": "US",         "originCurrency": from_ccy,
                "destCountry": country,        "destCurrency": to_ccy,
                "principalAmount": str(int(amount)),
                "paymentType": "BANK_ACCOUNT", "deliveryMethod": "BANK_ACCOUNT",
            },
        },
    ]

    for ep in endpoints:
        try:
            headers = {**HEADERS, "Content-Type": "application/json",
                       "Referer": "https://www.westernunion.com/us/en/send-money/app/price-estimator"}
            resp = SESSION.post(ep["url"], json=ep["body"], headers=headers, timeout=15)
            if resp.status_code != 200:
                continue
            data = resp.json()

            # Navigate WU's nested response
            options = data.get("paymentOptions") or data.get("pricingOptions") or [data]
            chosen = options[0] if options else data

            fee      = _find_val(chosen, ["fee", "transferFee", "transactionFee", "charges"])
            rate     = _find_val(chosen, ["fxRate", "exchangeRate", "rate"])
            received = _find_val(chosen, ["destPrincipalAmount", "receiveAmount",
                                          "destinationPrincipalAmount", "recipientAmount"])

            if rate is None:
                continue

            quote = Quote(
                provider="Western Union", from_ccy=from_ccy, to_ccy=to_ccy, send_amount=amount,
                fee_usd=float(fee or 0), fx_rate=float(rate),
                received_amount=float(received) if received else None,
                note="Bank account delivery (online)",
            )
            quote.calc_markup(mid)
            quote.calc_received()
            return quote

        except Exception:
            continue

    return Quote("Western Union", from_ccy, to_ccy, amount,
                 error="API unavailable — may require browser session")


# ── Provider: MoneyGram ────────────────────────────────────────────────────────

def get_moneygram_quote(from_ccy: str, to_ccy: str, amount: float) -> Quote:
    """MoneyGram public fee estimator. Bank deposit delivery."""
    country = CURRENCY_TO_COUNTRY.get(to_ccy, "")
    mid = APPROX_MID_MARKET.get((from_ccy, to_ccy))

    endpoints = [
        {
            "method": "GET",
            "url": "https://www.moneygram.com/mgo/us/en/fee-estimator/api/estimate",
            "params": {
                "sendCurrency": from_ccy,    "receiveCurrency": to_ccy,
                "receiveCountry": country,   "sendAmount": str(int(amount)),
                "paymentMethod": "BANK_ACCOUNT",
                "deliveryMethod": "RECEIVE_MONEY_IN_BANK_ACCOUNT",
            },
        },
        {
            "method": "GET",
            "url": "https://api.moneygram.com/consumer/v1/fees",
            "params": {
                "senderCurrency": from_ccy,  "receiverCurrency": to_ccy,
                "destinationCountry": country, "sendAmount": str(int(amount)),
                "receiveMethod": "BANK_DEPOSIT",
            },
        },
    ]

    for ep in endpoints:
        try:
            resp = SESSION.get(ep["url"], params=ep.get("params"), timeout=15)
            if resp.status_code != 200:
                continue

            # MGram sometimes returns HTML for some endpoints
            ct = resp.headers.get("content-type", "")
            if "html" in ct:
                continue

            data = resp.json()

            fee      = _find_val(data, ["fee", "transferFee", "totalFee", "mgiSendFee"])
            rate     = _find_val(data, ["exchangeRate", "fxRate", "rate", "receiveExchangeRate"])
            received = _find_val(data, ["receiveAmount", "destinationAmount",
                                        "receiverAmount", "estimatedReceiveAmount"])

            if rate is None:
                continue

            quote = Quote(
                provider="MoneyGram", from_ccy=from_ccy, to_ccy=to_ccy, send_amount=amount,
                fee_usd=float(fee or 0), fx_rate=float(rate),
                received_amount=float(received) if received else None,
                note="Bank deposit delivery",
            )
            quote.calc_markup(mid)
            quote.calc_received()
            return quote

        except Exception:
            continue

    return Quote("MoneyGram", from_ccy, to_ccy, amount,
                 error="API unavailable — endpoint may have changed")


# ── Provider: Revolut (browser) ───────────────────────────────────────────────

def get_revolut_quote_browser(from_ccy: str, to_ccy: str, amount: float) -> Quote:
    """Scrapes Revolut's public transfer page. Standard plan, bank transfer."""
    mid = APPROX_MID_MARKET.get((from_ccy, to_ccy))
    try:
        from playwright.sync_api import sync_playwright
    except ImportError:
        return Quote("Revolut", from_ccy, to_ccy, amount,
                     error="Playwright not installed")

    try:
        with sync_playwright() as p:
            browser = p.chromium.launch(headless=True)
            page = browser.new_page(user_agent=HEADERS["User-Agent"])

            captured_json = {}

            def on_response(response):
                url = response.url.lower()
                if any(k in url for k in ["transfer", "quote", "rate", "price", "fee"]):
                    try:
                        body = response.json()
                        if isinstance(body, dict) and any(
                            k in body for k in ["fee", "rate", "amount", "quote"]
                        ):
                            captured_json.update(body)
                    except Exception:
                        pass

            page.on("response", on_response)

            # Try Revolut's public transfer info page
            url = (f"https://www.revolut.com/en-US/money-transfer/"
                   f"{from_ccy.lower()}-to-{to_ccy.lower()}/")
            try:
                page.goto(url, wait_until="networkidle", timeout=25000)
                time.sleep(2)
            except Exception:
                pass

            page_text = page.inner_text("body")
            browser.close()

        # Try captured API data first
        if captured_json:
            fee  = _find_val(captured_json, ["fee", "transferFee", "totalFee"])
            rate = _find_val(captured_json, ["rate", "exchangeRate", "fxRate"])
            recv = _find_val(captured_json, ["recipientAmount", "receiveAmount", "amount"])
            if rate:
                q = Quote("Revolut", from_ccy, to_ccy, amount,
                          fee_usd=float(fee or 0), fx_rate=float(rate),
                          received_amount=float(recv) if recv else None,
                          note="Standard plan, external bank transfer")
                q.calc_markup(mid)
                q.calc_received()
                return q

        # Fallback: parse page text
        rate_match = re.search(
            r"1\s*" + from_ccy + r"\s*[=≈→]\s*([\d.,]+)\s*" + to_ccy, page_text, re.IGNORECASE
        )
        fee_match = re.search(
            r"(?:fee|charge)[^\d]*([\d.]+)\s*(?:USD|\$)", page_text, re.IGNORECASE
        )
        recv_match = re.search(
            r"(?:receive[sd]?|recipient gets|you send)[^\d]*([\d,]+\.?\d*)\s*" + to_ccy,
            page_text, re.IGNORECASE
        )

        rate = float(rate_match.group(1).replace(",", "")) if rate_match else None
        fee  = float(fee_match.group(1)) if fee_match else 5.0  # Revolut standard plan ~$5
        recv = float(recv_match.group(1).replace(",", "")) if recv_match else None

        if rate:
            q = Quote("Revolut", from_ccy, to_ccy, amount,
                      fee_usd=fee, fx_rate=rate, received_amount=recv,
                      note="Standard plan, external bank transfer (page scraped)")
            q.calc_markup(mid)
            q.calc_received()
            return q

        return Quote("Revolut", from_ccy, to_ccy, amount,
                     error="Could not extract rate from page")

    except Exception as e:
        return Quote("Revolut", from_ccy, to_ccy, amount,
                     error=f"Browser scrape failed: {str(e)[:80]}")


# ── Provider: Euronet (browser) ───────────────────────────────────────────────

def get_euronet_quote_browser(from_ccy: str, to_ccy: str, amount: float) -> Quote:
    """Scrapes Euronet's public pages. Coverage varies by corridor."""
    mid = APPROX_MID_MARKET.get((from_ccy, to_ccy))
    try:
        from playwright.sync_api import sync_playwright
    except ImportError:
        return Quote("Euronet", from_ccy, to_ccy, amount, error="Playwright not installed")

    urls_to_try = [
        f"https://www.euronet.eu/send-money?from={from_ccy}&to={to_ccy}&amount={int(amount)}",
        f"https://www.ria.com/send-money/{from_ccy.lower()}-to-{to_ccy.lower()}",
    ]

    try:
        with sync_playwright() as p:
            browser = p.chromium.launch(headless=True)
            page = browser.new_page(user_agent=HEADERS["User-Agent"])
            captured = {}

            def on_response(response):
                try:
                    body = response.json()
                    if isinstance(body, dict) and any(
                        k in body for k in ["rate", "fee", "amount", "exchange"]
                    ):
                        captured.update(body)
                except Exception:
                    pass

            page.on("response", on_response)

            page_text = ""
            for url in urls_to_try:
                try:
                    page.goto(url, wait_until="networkidle", timeout=20000)
                    time.sleep(2)
                    page_text = page.inner_text("body")
                    if any(c in page_text for c in [to_ccy, from_ccy, "rate", "fee"]):
                        break
                except Exception:
                    continue

            browser.close()

        rate_match = re.search(
            r"1\s*(?:USD|\$)\s*[=≈→]\s*([\d.,]+)\s*" + to_ccy, page_text, re.IGNORECASE
        )
        fee_match  = re.search(r"fee[:\s$]*([\d.]+)", page_text, re.IGNORECASE)
        recv_match = re.search(
            r"([\d,]+\.?\d*)\s*" + to_ccy + r"\s*(?:received|you get|recipient)",
            page_text, re.IGNORECASE
        )

        rate = float(rate_match.group(1).replace(",", "")) if rate_match else None
        fee  = float(fee_match.group(1)) if fee_match else None
        recv = float(recv_match.group(1).replace(",", "")) if recv_match else None

        if rate:
            q = Quote("Euronet", from_ccy, to_ccy, amount,
                      fee_usd=fee, fx_rate=rate, received_amount=recv,
                      note="Bank transfer (scraped)")
            q.calc_markup(mid)
            q.calc_received()
            return q

        return Quote("Euronet", from_ccy, to_ccy, amount,
                     error="Euronet does not support this corridor")

    except Exception as e:
        return Quote("Euronet", from_ccy, to_ccy, amount,
                     error=f"Scrape failed: {str(e)[:80]}")


# ── Helpers ────────────────────────────────────────────────────────────────────

def _find_val(d: dict, keys: list):
    """Search a dict for the first matching key, return float value or None."""
    if not isinstance(d, dict):
        return None
    for k in keys:
        v = d.get(k)
        if v is not None:
            try:
                return float(v)
            except (TypeError, ValueError):
                continue
    return None


# ── Orchestrator ───────────────────────────────────────────────────────────────

def fetch_all_quotes(corridors, amounts, use_browser=True):
    all_quotes = []

    for from_ccy, to_ccy in corridors:
        print(f"\n{'='*55}")
        print(f"  {from_ccy} → {to_ccy}")
        print(f"{'='*55}")

        wise_covered = {amt: set() for amt in amounts}

        # 1. Wise Comparison API (covers most providers)
        for amount in amounts:
            print(f"  [Wise API] ${amount:,} ... ", end="", flush=True)
            quotes = get_wise_quotes(from_ccy, to_ccy, amount)
            for q in quotes:
                all_quotes.append(q)
                if not q.error:
                    wise_covered[amount].add(q.provider.lower().replace(" ", ""))
            providers_found = [q.provider for q in quotes if not q.error]
            print(", ".join(providers_found) if providers_found else "no data")
            time.sleep(0.5)

        # 2. Remitly direct (if not covered by Wise API)
        for amount in amounts:
            if "remitly" not in wise_covered[amount]:
                print(f"  [Remitly] ${amount:,} ... ", end="", flush=True)
                q = get_remitly_quote(from_ccy, to_ccy, amount)
                all_quotes.append(q)
                print("✓" if not q.error else f"✗ {q.error[:60]}")
                time.sleep(0.5)

        # 3. Western Union direct (if not covered)
        for amount in amounts:
            if "westernunion" not in wise_covered[amount]:
                print(f"  [Western Union] ${amount:,} ... ", end="", flush=True)
                q = get_western_union_quote(from_ccy, to_ccy, amount)
                all_quotes.append(q)
                print("✓" if not q.error else f"✗ {q.error[:60]}")
                time.sleep(0.5)

        # 4. MoneyGram direct (if not covered)
        for amount in amounts:
            if "moneygram" not in wise_covered[amount]:
                print(f"  [MoneyGram] ${amount:,} ... ", end="", flush=True)
                q = get_moneygram_quote(from_ccy, to_ccy, amount)
                all_quotes.append(q)
                print("✓" if not q.error else f"✗ {q.error[:60]}")
                time.sleep(0.5)

        # 5. Revolut browser (if not covered)
        if use_browser:
            for amount in amounts:
                if "revolut" not in wise_covered[amount]:
                    print(f"  [Revolut browser] ${amount:,} ... ", end="", flush=True)
                    q = get_revolut_quote_browser(from_ccy, to_ccy, amount)
                    all_quotes.append(q)
                    print("✓" if not q.error else f"✗ {q.error[:60]}")
                    time.sleep(1)

        # 6. Euronet browser
        if use_browser:
            for amount in amounts:
                print(f"  [Euronet browser] ${amount:,} ... ", end="", flush=True)
                q = get_euronet_quote_browser(from_ccy, to_ccy, amount)
                all_quotes.append(q)
                print("✓" if not q.error else f"✗ {q.error[:60]}")
                time.sleep(1)

    return all_quotes


