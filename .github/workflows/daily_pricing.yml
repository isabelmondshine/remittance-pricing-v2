name: Daily Remittance Pricing

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-pricing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests openpyxl playwright
          playwright install chromium

      - name: Run pricing script
        run: python remittance_pricer.py --output pricing_today.xlsx

      - name: Upload Excel report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: remittance-pricing-${{ github.run_id }}
          path: pricing_*.xlsx
          retention-days: 90
