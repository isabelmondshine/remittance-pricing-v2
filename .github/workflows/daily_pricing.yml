# ── Excel writer ───────────────────────────────────────────────────────────────

def write_excel(all_quotes, amounts, filename):
    wb = Workbook()
    ws = wb.active
    ws.title = "Pricing Summary"
    _write_summary(ws, all_quotes, amounts)

    # Per-corridor raw sheets
    corridors_seen = list(dict.fromkeys(f"{q.from_ccy}→{q.to_ccy}" for q in all_quotes))
    for cor in corridors_seen:
        ws2 = wb.create_sheet(title=cor)
        _write_raw(ws2, [q for q in all_quotes if f"{q.from_ccy}→{q.to_ccy}" == cor], amounts)

    # Legend
    wl = wb.create_sheet("Legend")
    _write_legend(wl)

    wb.save(filename)
    print(f"\n✅  Saved: {filename}")


def _write_summary(ws, all_quotes, amounts):
    # Group by corridor → provider → amount
    by_corridor = {}
    for q in all_quotes:
        cor = f"{q.from_ccy}→{q.to_ccy}"
        by_corridor.setdefault(cor, {}).setdefault(q.provider, {})[q.send_amount] = q

    COLS_PER_AMT = 4   # fee | rate | markup | received
    total_cols = 1 + len(amounts) * COLS_PER_AMT

    row = 1

    # Title
    ws.merge_cells(start_row=row, start_column=1, end_row=row, end_column=total_cols)
    ws.cell(row, 1).value = "FT Partners — Remittance Competitive Pricing Tracker"
    ws.cell(row, 1).font  = Font(bold=True, size=14, color=C_WHITE, name="Arial")
    ws.cell(row, 1).fill  = _fill(C_NAVY)
    ws.cell(row, 1).alignment = Alignment(horizontal="center", vertical="center")
    ws.row_dimensions[row].height = 28
    row += 1

    ws.merge_cells(start_row=row, start_column=1, end_row=row, end_column=total_cols)
    ws.cell(row, 1).value = (
        f"Bank-to-bank transfers · Source: Wise API + direct provider APIs · "
        f"Generated: {datetime.now().strftime('%Y-%m-%d %H:%M')}"
    )
    ws.cell(row, 1).font  = _font(italic=True, color=C_WHITE, size=9)
    ws.cell(row, 1).fill  = _fill(C_BLUE)
    ws.cell(row, 1).alignment = Alignment(horizontal="center")
    row += 2

    for corridor, providers in by_corridor.items():
        # Corridor header
        ws.merge_cells(start_row=row, start_column=1, end_row=row, end_column=total_cols)
        ws.cell(row, 1).value = f"  {corridor}  ·  Bank Account Delivery"
        ws.cell(row, 1).font  = Font(bold=True, size=11, color=C_WHITE, name="Arial")
        ws.cell(row, 1).fill  = _fill(C_BLUE)
        ws.cell(row, 1).alignment = Alignment(horizontal="left", vertical="center")
        ws.row_dimensions[row].height = 22
        row += 1

        # Amount headers
        ws.cell(row, 1).value = "Provider"
        ws.cell(row, 1).font  = _font(bold=True, color=C_WHITE)
        ws.cell(row, 1).fill  = _fill(C_NAVY)
        ws.cell(row, 1).alignment = Alignment(horizontal="center", vertical="center")
        ws.cell(row, 1).border = _border()

        col = 2
        for amt in amounts:
            ws.merge_cells(start_row=row, start_column=col, end_row=row, end_column=col + COLS_PER_AMT - 1)
            c = ws.cell(row, col)
            c.value = f"${amt:,}"
            c.font  = _font(bold=True, color=C_WHITE)
            c.fill  = _fill(C_NAVY)
            c.alignment = Alignment(horizontal="center", vertical="center")
            c.border = _border()
            col += COLS_PER_AMT
        ws.row_dimensions[row].height = 18
        row += 1

        # Sub-headers
        ws.cell(row, 1).fill = _fill(C_LBLUE)
        ws.cell(row, 1).border = _border()
        col = 2
        for amt in amounts:
            for lbl in ["Fee ($)", "FX Rate", "Mkp %", "Received"]:
                c = ws.cell(row, col)
                c.value = lbl
                c.font  = _font(bold=True, size=8)
                c.fill  = _fill(C_LBLUE)
                c.alignment = Alignment(horizontal="center")
                c.border = _border()
                col += 1
        ws.row_dimensions[row].height = 14
        row += 1

        # Best per amount
        best_rcv = {}
        best_fee = {}
        for pname, pdata in providers.items():
            for amt in amounts:
                q = pdata.get(amt)
                if not q or q.error:
                    continue
                if q.received_amount and (amt not in best_rcv or q.received_amount > best_rcv[amt]):
                    best_rcv[amt] = q.received_amount
                if q.fee_usd is not None and (amt not in best_fee or q.fee_usd < best_fee[amt]):
                    best_fee[amt] = q.fee_usd

        # Provider rows
        for i, pname in enumerate(sorted(providers.keys())):
            pdata = providers[pname]
            bg = C_WHITE if i % 2 == 0 else C_GREY

            ws.cell(row, 1).value = pname
            ws.cell(row, 1).font  = _font(bold=True)
            ws.cell(row, 1).fill  = _fill(bg)
            ws.cell(row, 1).alignment = Alignment(horizontal="left", vertical="center", indent=1)
            ws.cell(row, 1).border = _border()

            col = 2
            for amt in amounts:
                q = pdata.get(amt)
                is_best_rcv = (q and not q.error and q.received_amount
                               and q.received_amount == best_rcv.get(amt))
                is_best_fee = (q and not q.error and q.fee_usd is not None
                               and q.fee_usd == best_fee.get(amt))
                row_bg = C_BEST if is_best_rcv else bg

                if not q or q.error:
                    err_txt = q.error[:35] if q and q.error else "N/A"
                    for offset in range(COLS_PER_AMT):
                        c = ws.cell(row, col + offset)
                        c.value = f"⚠ {err_txt}" if offset == 0 else ""
                        c.font  = _font(size=8, italic=True, color="AA0000")
                        c.fill  = _fill("FFF0F0")
                        c.border = _border()
                    col += COLS_PER_AMT
                    continue

                # Fee
                c = ws.cell(row, col)
                c.value  = round(q.fee_usd, 2) if q.fee_usd is not None else "—"
                c.number_format = '$#,##0.00'
                c.font   = _font(bold=is_best_fee, color="006600" if is_best_fee else C_DGREY)
                c.fill   = _fill(C_BEST if is_best_fee else bg)
                c.alignment = Alignment(horizontal="right")
                c.border = _border()
                col += 1

                # FX Rate
                c = ws.cell(row, col)
                c.value  = round(q.fx_rate, 4) if q.fx_rate else "—"
                c.number_format = '0.0000'
                c.font   = _font()
                c.fill   = _fill(bg)
                c.alignment = Alignment(horizontal="right")
                c.border = _border()
                col += 1

                # FX Markup
                c = ws.cell(row, col)
                mkp = q.fx_markup_pct
                c.value  = round(mkp / 100, 4) if mkp is not None else "—"
                c.number_format = '0.00%'
                if mkp is not None:
                    if mkp < 0.5:
                        c.fill = _fill(C_GREEN);  c.font = _font(color="276221", bold=True)
                    elif mkp < 1.5:
                        c.fill = _fill(C_AMBER);  c.font = _font(color="7D6608", bold=True)
                    else:
                        c.fill = _fill(C_RED_BG); c.font = _font(color="B22222", bold=True)
                else:
                    c.fill = _fill(bg); c.font = _font()
                c.alignment = Alignment(horizontal="right")
                c.border = _border()
                col += 1

                # Received
                c = ws.cell(row, col)
                c.value  = round(q.received_amount, 2) if q.received_amount else "—"
                c.number_format = '#,##0.00'
                c.font   = _font(bold=is_best_rcv, color="006600" if is_best_rcv else C_DGREY)
                c.fill   = _fill(row_bg)
                c.alignment = Alignment(horizontal="right")
                c.border = _border()
                col += 1

            ws.row_dimensions[row].height = 15
            row += 1

        row += 2  # spacer

    # Column widths
    ws.column_dimensions["A"].width = 18
    col_idx = 2
    for _ in amounts:
        ws.column_dimensions[get_column_letter(col_idx)].width     = 9   # fee
        ws.column_dimensions[get_column_letter(col_idx + 1)].width = 9   # rate
        ws.column_dimensions[get_column_letter(col_idx + 2)].width = 8   # markup
        ws.column_dimensions[get_column_letter(col_idx + 3)].width = 13  # received
        col_idx += 4

    ws.freeze_panes = "B4"


def _write_raw(ws, quotes, amounts):
    headers = ["Provider", "From", "To", "Send Amount", "Fee ($)",
               "FX Rate", "FX Markup %", "Received", "Note", "Error"]
    for col, h in enumerate(headers, 1):
        c = ws.cell(1, col)
        c.value = h
        c.font  = _font(bold=True, color=C_WHITE)
        c.fill  = _fill(C_NAVY)
        c.border = _border()
        c.alignment = Alignment(horizontal="center")

    for row, q in enumerate(quotes, 2):
        vals = [q.provider, q.from_ccy, q.to_ccy, q.send_amount,
                q.fee_usd, q.fx_rate,
                round(q.fx_markup_pct / 100, 4) if q.fx_markup_pct is not None else None,
                q.received_amount, q.note, q.error]
        for col, v in enumerate(vals, 1):
            c = ws.cell(row, col)
            c.value = v
            c.font  = _font()
            c.border = _border()
            if col == 4:  c.number_format = '$#,##0'
            if col == 5:  c.number_format = '$#,##0.00'
            if col == 6:  c.number_format = '0.0000'
            if col == 7:  c.number_format = '0.00%'
            if col == 8:  c.number_format = '#,##0.00'

    for i, w in enumerate([18, 6, 6, 12, 10, 10, 10, 14, 45, 40], 1):
        ws.column_dimensions[get_column_letter(i)].width = w
    ws.auto_filter.ref = f"A1:{get_column_letter(len(headers))}1"
    ws.freeze_panes = "A2"


def _write_legend(ws):
    ws.title = "Legend & Notes"
    rows = [
        ("COLOR CODING", ""),
        ("Green FX markup",  "< 0.5% above mid-market — excellent rate"),
        ("Amber FX markup",  "0.5%–1.5% above mid-market — moderate"),
        ("Red FX markup",    "> 1.5% above mid-market — expensive"),
        ("Green background (Received)", "Best received amount for that send amount"),
        ("Green background (Fee)",      "Lowest fee for that send amount"),
        ("", ""),
        ("DATA SOURCES", ""),
        ("Wise Comparison API", "api.wise.com/v4/comparisons — public, no auth. Scrapes competitors ~hourly. Bank transfer in/out only."),
        ("Remitly",             "api.remitly.com — public calculator. Economy rate, bank deposit."),
        ("Western Union",       "westernunion.com price estimator. Bank account in/out."),
        ("MoneyGram",           "moneygram.com fee estimator. Bank deposit."),
        ("Revolut",             "Headless browser (Playwright). Standard plan, external bank transfer."),
        ("Euronet",             "Headless browser (Playwright). Coverage varies by corridor."),
        ("", ""),
        ("NOTES", ""),
        ("FX Markup",     "% above mid-market rate at time of collection."),
        ("Received",      "Amount recipient gets in destination currency after all fees + FX markup."),
        ("Bank Transfer", "All pricing = bank account send + bank account receive. Not cash pickup."),
        ("Revolut plan",  "Standard (free) plan. Premium/Metal have lower fees."),
        ("Promos",        "Some providers offer first-transfer promos. Script fetches standard rates."),
    ]
    ws.column_dimensions["A"].width = 30
    ws.column_dimensions["B"].width = 85
    for i, (label, value) in enumerate(rows, 1):
        ws.cell(i, 1).value = label
        ws.cell(i, 2).value = value
        if label.isupper() and label:
            ws.cell(i, 1).font = Font(bold=True, size=10, color=C_WHITE, name="Arial")
            ws.cell(i, 1).fill = _fill(C_BLUE)
            ws.cell(i, 2).fill = _fill(C_BLUE)
        else:
            ws.cell(i, 1).font = _font(bold=bool(label))
            ws.cell(i, 2).font = _font()
        ws.row_dimensions[i].height = 15


# ── Entry point ────────────────────────────────────────────────────────────────

def main():
    parser = argparse.ArgumentParser(description="FT Partners Remittance Pricing Tracker")
    parser.add_argument("--corridors", nargs="+", default=None,
                        help="e.g. USD-EUR USD-INR")
    parser.add_argument("--amounts", nargs="+", type=int, default=None,
                        help="e.g. 100 500 1000 5000 10000")
    parser.add_argument("--no-browser", action="store_true",
                        help="Skip Revolut + Euronet browser scraping")
    parser.add_argument("--output", type=str, default=None)
    args = parser.parse_args()

    corridors = CORRIDORS
    if args.corridors:
        corridors = [tuple(c.replace("-", " ").split()) for c in args.corridors]

    amounts     = args.amounts or AMOUNTS
    use_browser = not args.no_browser
    output_file = args.output or f"remittance_pricing_{datetime.now().strftime('%Y%m%d_%H%M%S')}.xlsx"

    print("\n" + "═" * 55)
    print("  FT Partners — Remittance Pricing Tracker")
    print("═" * 55)
    print(f"  Corridors : {', '.join(f'{a}→{b}' for a, b in corridors)}")
    print(f"  Amounts   : {', '.join(f'${a:,}' for a in amounts)}")
    print(f"  Browser   : {'on (Revolut + Euronet)' if use_browser else 'off'}")
    print(f"  Output    : {output_file}\n")

    all_quotes = fetch_all_quotes(corridors, amounts, use_browser=use_browser)

    errors = [q for q in all_quotes if q.error]
    print(f"\n  Total quotes : {len(all_quotes)}")
    print(f"  Errors       : {len(errors)}")

    write_excel(all_quotes, amounts, output_file)


if __name__ == "__main__":
    main()
